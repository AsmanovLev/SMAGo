            - text: with your own logo and color palette
        - separator [ref=e205]
        - heading "How Do Bots Work?" [level=3] [ref=e206]:
          - link [ref=e356]:
            - /url: "#how-do-bots-work"
          - text: How Do Bots Work?
        - blockquote [ref=e207]:
          - paragraph [ref=e208]:
            - text: For a detailed explanation of Bot Features, see
            - link "this guide" [ref=e209] [cursor=pointer]:
              - /url: /bots/features
        - paragraph [ref=e210]: Telegram bots are special accounts that do not need a phone number to set up. Bots are connected to their owner’s server, which processes inputs and requests from users.
        - paragraph [ref=e211]:
          - text: Telegram’s intermediary server handles all encryption and communication with the Telegram API. Developers communicate with this server via an easy HTTPS-interface with a simplified version of the
          - link "Telegram API" [ref=e212] [cursor=pointer]:
            - /url: /api
          - text: – known as the
          - link "Bot API" [ref=e213] [cursor=pointer]:
            - /url: /bots/api
          - text: .
        - heading "How Are Bots Different from Users?" [level=4] [ref=e214]:
          - link [ref=e358]:
            - /url: "#how-are-bots-different-from-users"
          - text: How Are Bots Different from Users?
        - paragraph [ref=e215]: Bots are able to process inputs and requests in ways that user accounts can’t, but there are several differences between a bot and a normal user.
        - list [ref=e216]:
          - listitem [ref=e217]: Bots don’t have ‘last seen’ or online statuses – instead they show a ‘bot’ label in the chat.
          - listitem [ref=e218]: Bots have limited cloud storage – older messages may be removed by the server shortly after they have been processed.
          - listitem [ref=e219]: Bots can't start conversations with users. A user must either add them to a group or send them a message first. People can search for your bot’s username or start a chat via its unique t.me/bot_username link.
          - listitem [ref=e220]:
            - text: By default, bots added to groups
            - strong [ref=e221]: only see relevant messages
            - text: in the chat (see
            - link "Privacy Mode" [ref=e222] [cursor=pointer]:
              - /url: /bots/features#privacy-mode
            - text: ).
          - listitem [ref=e223]: Bots never eat, sleep or complain (unless expressly programmed otherwise).
        - heading "Bot Links" [level=4] [ref=e224]:
          - link [ref=e360]:
            - /url: "#bot-links"
          - text: Bot Links
        - paragraph [ref=e225]:
          - text: Bot usernames normally require a ‘bot’ suffix, but some bots don’t have them – such as
          - link "@stickers" [ref=e226] [cursor=pointer]:
            - /url: https://t.me/stickers
          - text: ","
          - link "@gif" [ref=e227] [cursor=pointer]:
            - /url: https://t.me/gif
          - text: ","
          - link "@wiki" [ref=e228] [cursor=pointer]:
            - /url: https://t.me/wiki
          - text: or
          - link "@bing" [ref=e229] [cursor=pointer]:
            - /url: https://t.me/bing
          - text: .
        - paragraph [ref=e230]:
          - text: Anyone can
          - link "assign collectible usernames" [ref=e231] [cursor=pointer]:
            - /url: https://telegram.org/blog/shareable-folders-custom-wallpapers#bot-links-and-telegram-premium-on-fragment
          - text: to bots, including those without the 'bot' suffix.
        - heading "How Do I Create a Bot?" [level=3] [ref=e232]:
          - link [ref=e362]:
            - /url: "#how-do-i-create-a-bot"
          - text: How Do I Create a Bot?
        - paragraph [ref=e233]:
          - text: Creating Telegram bots is super-easy, but you will need at least some skills in
          - strong [ref=e234]: computer programming
          - text: .
        - paragraph [ref=e235]:
          - text: Creating a bot is streamlined by Telegram’s Bot API, which gives the tools and framework required to integrate your code. To get started, message
          - link "@BotFather" [ref=e236] [cursor=pointer]:
            - /url: https://t.me/botfather
          - text: on Telegram to register your bot and receive its authentication token.
        - blockquote [ref=e237]:
          - paragraph [ref=e238]:
            - text: Your
            - strong [ref=e239]: bot token
            - text: is its unique identifier – store it in a
            - strong [ref=e240]: secure place
            - text: ", and only share it with people who need direct access to the bot. Everyone who has your token will have"
            - strong [ref=e241]: full control
            - text: over your bot.
