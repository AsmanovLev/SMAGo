        - paragraph [ref=e198]:
          - text: The possibilities for bots are endless – from simple scripts to complex mini apps. Whether you’re a beginner or professional programmer, you can create personalized tools with the help of the
          - link "Bot Platform" [ref=e199] [cursor=pointer]:
            - /url: /bots/api
          - text: .
        - blockquote [ref=e200]:
          - paragraph [ref=e201]:
            - text: All Mini Apps you build on Telegram can be
            - strong [ref=e202]: highly customized
            - text: to fit your brand identity, including by uploading high-quality
            - link "media demos" [ref=e203] [cursor=pointer]:
              - /url: "#mini-app-previews"
            - text: and setting a custom
            - link "Loading Screen" [ref=e204] [cursor=pointer]:
