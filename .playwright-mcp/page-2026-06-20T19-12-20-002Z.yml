                - generic [ref=e692]:
                  - generic [ref=e693]: "# test/my_app/responders/great_success_test.exs defmodule MyApp.Responders.GreatSuccessTest do use Hedwig.RobotCase @tag start_robot: true, name: \"alfred\", responders: [{MyApp.Responders.GreatSuccess, []}] test \"great success - responds with a borat url\", %{adapter: adapter, msg: msg} do send adapter, {:message, %{msg | text: \"great success\"}} assert_receive {:message, %{text: text}} assert String.contains?(text, \"http\") end end"
