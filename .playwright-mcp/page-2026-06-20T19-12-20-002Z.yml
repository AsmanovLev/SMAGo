                - paragraph [ref=e657]: Responders are processes that will handle incoming messages.
                - paragraph [ref=e658]:
                  - text: All that's needed is to
                  - code [ref=e659]: use Hedwig.Responder
                  - text: and use the
                  - code [ref=e660]: hear/2
                  - text: ", or"
                  - code [ref=e661]: respond/2
                  - text: macros to define a pattern to listen for and how to respond in the block when a message matches.
                - paragraph [ref=e662]: "Here is an example:"
                - generic [ref=e663]:
                  - generic [ref=e664]:
                    - text: defmodule MyApp.Responders.GreatSuccess do @moduledoc """ Borat, Great Success!
                    - text: Replies with a random link to a Borat image when a message contains 'great success'. """ use Hedwig.Responder @links [ "http://mjanja.co.ke/wordpress/wp-content/uploads/2013/09/borat_great_success.jpg", "http://s2.quickmeme.com/img/13/1324dfd733535e58dba70264e6d05c9b70346204d2cacef65abef9c702746d1c.jpg", "https://www.youtube.com/watch?v=r13riaRKGo0" ] @usage """ <text> (great success) - Replies with a random Borat image. """ hear
                    - generic [ref=e665]: ~r/great success(!)?/i
                    - text: ", msg do reply msg, random(@links) end end"
                  - button "Copy code to clipboard" [ref=e667] [cursor=pointer]:
                    - img [ref=e668]
                - generic [ref=e671]:
                  - heading "Hear vs. Respond" [level=2] [ref=e672]
