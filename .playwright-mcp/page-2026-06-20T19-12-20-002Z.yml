                - paragraph [ref=e609]:
                  - text: If you want to start, stop, and send messages to your bot without keeping track of its
                  - code [ref=e610]: pid
                  - text: ", you can register your robot in the"
                  - code [ref=e611]: handle_connect/1
                  - text: "callback in your robot module like so:"
                - generic [ref=e612]:
                  - generic [ref=e613]: "defmodule Alfred.Robot do use Hedwig.Robot, otp_app: :alfred def handle_connect(%{name: name} = state) do if :undefined == :global.whereis_name(name) do :yes = :global.register_name(name, self()) end {:ok, state} end end"
