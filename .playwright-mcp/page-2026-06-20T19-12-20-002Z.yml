                    - /url: "#hear-vs-respond"
                    - img [ref=e674]
                - paragraph [ref=e676]: "The two responder macros are use for different reasons:"
                - list [ref=e677]:
                  - listitem [ref=e678]:
                    - code [ref=e679]: hear
                    - text: "- matches messages containing the regular expression"
                  - listitem [ref=e680]:
                    - code [ref=e681]: respond
                    - text: "- matches only when prefixed by your robot's configured"
                    - code [ref=e682]: name
                    - text: or
                    - code [ref=e683]: aka
                    - text: value.
