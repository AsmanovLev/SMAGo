            - iframe [ref=e241]:
              - article [ref=f31e2]:
                - heading "pe4kin" [level=1] [ref=f31e3]
                - paragraph [ref=f31e4]: Erlang Telegram bot library. Erlang wrapper for Telegram messenger bot APIs.
                - paragraph [ref=f31e5]:
                  - text: With pe4kin you can receive, send, reply and forward text, as well as media messages using
                  - link "telegram bot API" [ref=f31e6] [cursor=pointer]:
                    - /url: https://core.telegram.org/bots/api
                  - text: .
                - paragraph [ref=f31e7]:
                  - text: Pe4kin is the name of the
                  - link "multiplicational postman" [ref=f31e8] [cursor=pointer]:
                    - /url: https://ru.wikipedia.org/wiki/%D0%9F%D0%BE%D1%87%D1%82%D0%B0%D0%BB%D1%8C%D0%BE%D0%BD_%D0%9F%D0%B5%D1%87%D0%BA%D0%B8%D0%BD
                  - text: .
                - heading "Example" [level=2] [ref=f31e9]
                - code [ref=f31e11]:
                  - generic [ref=f31e12]: "% $ rebar3 compile"
                  - generic [ref=f31e13]: "% $ rebar3 shell"
                  - generic [ref=f31e15]: "> application:ensure_all_started(pe4kin)."
                  - generic [ref=f31e17]: "% First of all, you need to get bot's credentials."
                  - generic [ref=f31e18]: "% Consult telegram docs https://core.telegram.org/bots#6-botfather"
                  - generic [ref=f31e19]: "> BotName = <<\"Pe4kin_Test_Bot\">>."
                  - generic [ref=f31e20]: "> BotToken = <<\"186***:******\">>."
                  - generic [ref=f31e23]: "%"
                  - generic [ref=f31e24]: "% Receive messages from users"
                  - generic [ref=f31e25]: "%"
                  - generic [ref=f31e27]: "% Launch incoming messages receiver worker."
                  - generic [ref=f31e28]: "% XXX: In real applications you'll want to launch pe4kin_receiver gen_server"
                  - generic [ref=f31e29]: "% under supervisor!"
                  - generic [ref=f31e30]: "> pe4kin:launch_bot(BotName, BotToken, #{receiver => true})."
                  - generic [ref=f31e32]: "% Subscribe self to incoming messages"
                  - generic [ref=f31e33]: "> pe4kin_receiver:subscribe(BotName, self())."
                  - generic [ref=f31e35]: "% Start HTTP-polling of telegram server for incoming messages"
                  - generic [ref=f31e36]: "> pe4kin_receiver:start_http_poll(BotName, #{limit=>100, timeout=>60})."
                  - generic [ref=f31e38]: "% Wait for new messages."
                  - generic [ref=f31e39]: "% ...here you should send \"/start\" to this bot via telegram client..."
                  - generic [ref=f31e40]: "> Update = receive {pe4kin_update, BotName, Upd} -> Upd end."
                  - generic [ref=f31e42]: "% Guess incoming update payload type."
                  - generic [ref=f31e43]: "> message = pe4kin_types:update_type(Update)."
                  - generic [ref=f31e45]: "% Note `ChatId` - it uniquely identifies this particular chat and will be used"
                  - generic [ref=f31e46]: "% in replies."
                  - generic [ref=f31e47]: "> #{<<\"message\">> := #{<<\"chat\">> := #{<<\"id\">> := ChatId}} = Message} = Update."
                  - generic [ref=f31e49]: "% Guess message payload type"
                  - generic [ref=f31e50]: "> text = pe4kin_types:message_type(Message)."
                  - generic [ref=f31e52]: "% Decode \"/start\" command (will raise exception if no commands in message)"
                  - generic [ref=f31e53]: "> {<<\"/start\">>, BotName, true, _} = pe4kin_types:message_command(BotName, Message)."
                  - generic [ref=f31e56]: "%"
                  - generic [ref=f31e57]: "% Send messages"
                  - generic [ref=f31e58]: "%"
                  - generic [ref=f31e60]: "% Check that bot configured properly"
                  - generic [ref=f31e61]: "> {ok, #{<<\"first_name\">> := _, <<\"id\">> := _, <<\"username\">> := _}} = pe4kin:get_me(BotName)."
                  - generic [ref=f31e63]: "% Send reply to previously received `Update` message (note `ChatId`)"
                  - generic [ref=f31e64]: "> From = maps:get(<<\"first_name\">>, maps:get(<<\"from\">>, Message, #{}), <<\"Anonymous\">>)."
                  - generic [ref=f31e65]: "> HeartEmoji = pe4kin_emoji:name_to_char('heart')."
                  - generic [ref=f31e66]: "> ResponseText = unicode:characters_to_binary([<<\"Hello, \">>, From, HeartEmoji])."
                  - generic [ref=f31e67]: "> {ok, _} = pe4kin:send_message(BotName, #{chat_id => ChatId, text => ResponseText})."
                  - generic [ref=f31e69]: "% Send image to the same chat"
                  - generic [ref=f31e70]: "> CatImgFileName = \"funny_cat.jpg\"."
                  - generic [ref=f31e71]: "> {ok, CatImgBin} = file:read_file(CatImgFileName)."
                  - generic [ref=f31e72]: "> Photo = {file, CatImgFileName, <<\"image/jpeg\">>, CatImgBin}."
                  - generic [ref=f31e73]: "> {ok, _} = pe4kin:send_photo(BotName, #{chat_id => ChatId, photo => Photo})."
