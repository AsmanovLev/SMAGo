              - heading "Аутентификация" [level=3] [ref=e506]
              - paragraph [ref=e507]:
                - text: Для вызова API чата требуется аутентификация. Каждый метод API чата требует либо
                - link "аутентификации пользователя" [ref=e508] [cursor=pointer]:
                  - /url: https://developers.google.com/workspace/chat/authenticate-authorize-chat-user?hl=ru
                - text: (для выполнения действий или доступа к данным от имени пользователя), либо
                - link "аутентификации приложения" [ref=e509] [cursor=pointer]:
                  - /url: https://developers.google.com/workspace/chat/authenticate-authorize-chat-app?hl=ru
                - text: (для выполнения действий или доступа к данным в качестве приложения чата). Некоторые методы поддерживают как аутентификацию пользователя, так и аутентификацию приложения.
              - paragraph [ref=e510]:
                - text: Чтобы узнать больше об аутентификации в чате, см.
                - link "раздел «Обзор аутентификации»" [ref=e511] [cursor=pointer]:
                  - /url: https://developers.google.com/workspace/chat/authenticate-authorize?hl=ru
                - text: .
              - heading "Клиентские библиотеки" [level=3] [ref=e512]
              - paragraph [ref=e513]:
                - text: Для большинства разработчиков рекомендуемый способ вызова API Google Chat — использование официально поддерживаемых нами
                - link "облачных клиентских библиотек" [ref=e514] [cursor=pointer]:
                  - /url: https://developers.google.com/workspace/chat/libraries?hl=ru
                - text: для предпочитаемого языка программирования, например Python, Java или Node.js.
              - paragraph [ref=e515]:
                - text: Если вы используете Google Apps Script для программирования, воспользуйтесь
                - link "сервисом Advanced Chat" [ref=e516] [cursor=pointer]:
                  - /url: https://developers.google.com/apps-script/advanced/chat?hl=ru
                - text: вместо установки клиентской библиотеки.
              - heading "Создавайте приложения для чата." [level=2] [ref=e517]
              - paragraph [ref=e520]: "API чата позволяет создавать приложения Google Chat, которые интегрируют ваши сервисы и ресурсы непосредственно в Google Chat. Вы можете создавать приложения чата для выполнения следующих задач:"
              - list [ref=e521]:
                - listitem [ref=e522]: Получение информации на основе структурированных или свободных текстовых запросов, введенных пользователем.
                - listitem [ref=e523]: Создавайте отчеты об инцидентах или другие документы, используя информацию, предоставленную пользователем.
                - listitem [ref=e524]: Улучшите командное взаимодействие, например, обеспечив "командную память" или спланировав распределение ресурсов.
              - paragraph [ref=e525]: "Для проектирования чат-приложения можно использовать несколько различных архитектурных стилей, в том числе следующие:"
              - list [ref=e526]:
                - listitem [ref=e527]:
                  - strong [ref=e528]: Интерактивные приложения
                  - text: ": Реагируют на действия пользователя, такие как упоминания (@) или команды со слэшем, и представляют информацию или направляют пользователей по рабочему процессу с помощью карточек и диалогов."
                - listitem [ref=e529]:
                  - strong [ref=e530]: Приложения командной строки или веб-хуки
                  - text: ": отправляют упреждающие сообщения, такие как оповещения или уведомления, из другой системы в определенное пространство. Пользователи не могут напрямую взаимодействовать с приложениями такого типа."
                - listitem [ref=e531]:
                  - strong [ref=e532]: Приложения, управляемые событиями
                  - text: ": Подписываются на активность в чате и реагируют на неё, например, на присоединение нового пользователя. В ответ на событие приложение может отправить сообщение или выполнить другое действие."
              - paragraph [ref=e533]:
                - text: Подробную информацию о проектировании приложения для чата см. в разделе
                - link "«Выбор архитектуры приложения Google Chat»" [ref=e534] [cursor=pointer]:
                  - /url: https://developers.google.com/workspace/chat/structure?hl=ru
