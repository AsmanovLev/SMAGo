          - generic [ref=e299]: Когда человек отправляет сообщение Странице вашей компании или вашему профессиональному аккаунту Instagram, активируется уведомление Webhooks. Ваше приложение выполняет вызов к социальному графу Meta, чтобы получить переписку, определить подходящую реакцию и отправить его в течение 24 часов. Вы можете отправить автоматический ответ, перенаправить запрос на оператора или использовать комбинацию этих вариантов.
          - generic [ref=e300]: Платформа позволяет масштабировать этот процесс, а также предоставляет целый ряд типов сообщений и точек входа для переписки.
