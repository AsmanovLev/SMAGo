          - generic [ref=e290]: С помощью Messenger from Meta Страница Facebook компании или ее профессиональный аккаунт Instagram может отвечать пользователям, которые отправляют сообщения через Facebook, Instagram или плагин Meta в вашем мобильном приложении или на сайте. Переписку должен начать человек. Вы можете пользоваться платформой Messenger бесплатно.
          - generic [ref=e293]:
            - heading "Принципы работы" [level=2] [ref=e294]
            - button [ref=e295] [cursor=pointer]:
