          - generic [ref=e313]: Каждый пользователь, отправляющий сообщение вашей Странице Facebook или профессиональному аккаунту Instagram, получает уникальный ID, действующий в пределах этого аккаунта. Благодаря этому ID вы можете сопоставлять взаимодействия с одним и тем же человеком в разных приложениях для обмена сообщениями.
