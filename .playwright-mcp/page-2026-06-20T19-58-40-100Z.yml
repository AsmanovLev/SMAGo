        - article [ref=e33]:
          - paragraph [ref=e34]:
            - text: E
            - strong [ref=e35]: x
            - text: tensible
            - strong [ref=e36]: M
            - text: essaging and
            - strong [ref=e37]: P
            - text: resence
            - strong [ref=e38]: P
            - text: rotocol (XMPP) is an open XML technology for real-time communication, which powers a wide range of applications including instant messaging, presence and collaboration.
          - paragraph [ref=e39]: To understand what this really means, let’s go on a journey from P back to X…
          - heading "P — Protocol" [level=2] [ref=e40]
          - paragraph [ref=e41]: XMPP is a protocol; a set of standards that allows systems to talk to each other. XMPP is used widely across the web, but is often unadvertised. The protocol (or standards) are looked after by the XSF (link).
          - heading "P — Presence" [level=2] [ref=e42]
          - paragraph [ref=e43]: The presence indicator tells the servers that you are online / offline / busy. In technical terms, presence determines the state of an XMPP entity; in layman terms, whether you are there and ready to receive messages or not.
          - heading "M — Messaging" [level=2] [ref=e44]
          - paragraph [ref=e45]: The ‘messaging’ part of XMPP is the ‘piece’ you see; the Instant Message (IM) sent between clients. XMPP has been designed to send all messages in real-time using a very efficient push mechanism; whereas existing web based mechanisms often make many unnecessary requests introducing network load, and are consequently not real-time.
          - heading "X — eXtensible" [level=2] [ref=e46]
          - paragraph [ref=e47]: Defined in an open standard and using an open systems approach of development and application, XMPP is designed to be extensible. In other words, it has been designed to grow and accommodate changes.
