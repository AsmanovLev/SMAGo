                - generic [ref=e575]: "}"
              - paragraph [ref=e576]:
                - text: Now that you've got the
                - code [ref=e577]: id
                - text: of the breakfast club reminder you want to delete, one more method call awaits, so read on.
              - heading "Delete a scheduled messageDirect link to Delete a scheduled message" [level=3] [ref=e578]:
                - text: Delete a scheduled message
                - link "Direct link to Delete a scheduled message" [ref=e579] [cursor=pointer]:
                  - /url: "#deleting"
                  - text: "#"
              - paragraph [ref=e580]:
                - text: With the
                - code [ref=e581]: scheduled_message_id
                - text: that you need in hand, it's time to banish that breakfast reminder. Use the
                - link "chat.deleteScheduledMessage" [ref=e582] [cursor=pointer]:
                  - /url: /reference/methods/chat.deleteScheduledMessage
                  - code [ref=e583]: chat.deleteScheduledMessage
                - text: "endpoint:"
              - generic [ref=e584]:
                - tablist [ref=e585]:
                  - tab "HTTP" [selected] [ref=e586] [cursor=pointer]
                  - tab "Java" [ref=e587] [cursor=pointer]
                  - tab "JavaScript" [ref=e588] [cursor=pointer]
                  - tab "Python" [ref=e589] [cursor=pointer]
                - tabpanel [ref=e591]:
                  - code [ref=e595]:
                    - generic [ref=e596]: POST https://slack.com/api/chat.deleteScheduledMessage
                    - generic [ref=e597]: "Content-type: application/json"
                    - generic [ref=e598]: "Authorization: Bearer xoxb-your-token"
                    - generic [ref=e599]: "{"
                    - generic [ref=e600]: "\"channel\": \"YOUR_CHANNEL_ID\","
                    - generic [ref=e601]: "\"scheduled_message_id\": \"YOUR_SCHEDULED_MESSAGE_ID\""
                    - generic [ref=e602]: "}"
              - paragraph [ref=e603]: You'll receive the typical success response once your scheduled message has been deleted.
              - heading "Update a scheduled messageDirect link to Update a scheduled message" [level=3] [ref=e604]:
                - text: Update a scheduled message
                - link "Direct link to Update a scheduled message" [ref=e605] [cursor=pointer]:
                  - /url: "#updating"
                  - text: "#"
              - paragraph [ref=e606]:
                - text: To update a pending scheduled message,
                - link "delete" [ref=e607] [cursor=pointer]:
                  - /url: "#deleting"
                - text: the old message and then
                - link "schedule" [ref=e608] [cursor=pointer]:
                  - /url: "#scheduling"
                - text: a new one.
              - paragraph [ref=e609]:
                - text: Reminders, notifications, even calendars—all now fall within grasp of your app. You don't have to store any state at all if you don't wish to. Instead, list and delete your scheduled messages on the fly. Combine scheduled messages with
                - link "user interactivity" [ref=e610] [cursor=pointer]:
                  - /url: /messaging/creating-interactive-messages
                - text: to create a chat bot that's a capable, clever assistant. Enjoy the newfound simplicity of scheduled messages!
