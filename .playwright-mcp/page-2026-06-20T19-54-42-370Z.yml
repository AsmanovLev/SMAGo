                - text: if both are specified.
              - paragraph [ref=e556]:
                - text: The endpoint yields scheduled messages sent by your app, plus
                - link "pagination information" [ref=e557] [cursor=pointer]:
                  - /url: /apis/web-api/pagination
                - text: .
