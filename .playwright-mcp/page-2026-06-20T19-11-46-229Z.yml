                - heading "Usage" [level=2] [ref=f23e236]
                - heading "Webhook handling" [level=3] [ref=f23e237]
                - paragraph [ref=f23e238]: MessengerBot library handles allows you to handle all webhooks with subscription to the events.
                - heading "How to subscribe to event topics?" [level=4] [ref=f23e239]
                - paragraph [ref=f23e240]:
                  - code [ref=f23e241]: messenger_bot
                  - text: package uses
                  - link "event_bus library" [ref=f23e242] [cursor=pointer]:
                    - /url: https://github.com/otobus/event_bus
                  - text: to sent/process Messenger events. Please refer to
                  - code [ref=f23e243]: event_bus
                  - text: docs to learn more. You can subscribe registered events. To subscribe all events you can use
                  - code [ref=f23e244]: "EventBus.subscribe({listener, [\".*\"]})"
                  - text: and to subscribe only specific topics then
                  - code [ref=f23e245]: "EventBus.subscribe({listener, [\"mb_message_received$\", \"mb_postback_received$\"]})"
                  - text: . Please refer to
                  - code [ref=f23e246]: event_bus
                  - text: library to documentation and Github wiki pages for more information.
                - paragraph [ref=f23e247]: "Here is a sample echo bot consumer:"
                - code [ref=f23e249]:
                  - generic [ref=f23e250]: "EventBus.subscribe({MessengerBot.Consumer.Echo, [\"mb_message_received$\"]})"
                  - generic [ref=f23e252]: defmodule MessengerBot.Consumer.Echo do
                  - generic [ref=f23e253]: "@moduledoc \"\"\""
                  - generic [ref=f23e254]: Sample consumer implementation which echos for MessengerBot message events
                  - generic [ref=f23e255]: "\"\"\""
                  - generic [ref=f23e257]: use GenServer
                  - generic [ref=f23e259]: "@listener __MODULE__"
                  - generic [ref=f23e261]: "def process({:mb_message_received, _id} = event_shadow) do"
                  - generic [ref=f23e262]: "GenServer.cast(__MODULE__, {:echo, event_shadow})"
                  - generic [ref=f23e263]: end
                  - generic [ref=f23e265]: "# This func is not necessary, but just for an example"
                  - generic [ref=f23e266]: "def process({topic, id}) do"
                  - generic [ref=f23e267]: "EventBus.mark_as_skipped({@listener, topic, id})"
                  - generic [ref=f23e268]: end
                  - generic [ref=f23e270]: def start_link do
                  - generic [ref=f23e271]: "GenServer.start_link(__MODULE__, [], name: __MODULE__)"
                  - generic [ref=f23e272]: end
                  - generic [ref=f23e274]: def init(_opts) do
                  - generic [ref=f23e275]: "{:ok, []}"
                  - generic [ref=f23e276]: end
                  - generic [ref=f23e278]: "def handle_cast({:echo, {topic, id}}, state) do"
                  - generic [ref=f23e279]: "event = EventBus.fetch_event({topic, id})"
                  - generic [ref=f23e280]: echo_back(event.data)
                  - generic [ref=f23e281]: "EventBus.mark_as_completed({@listener, topic, id})"
                  - generic [ref=f23e283]: "{:noreply, state}"
                  - generic [ref=f23e284]: end
                  - generic [ref=f23e286]: "defp echo_back(%{app_id: app_id, page_id: page_id, messaging: messaging}) do"
                  - generic [ref=f23e287]: message = prepare_payload(messaging)
                  - generic [ref=f23e288]: "MessengerBot.send_message({app_id, page_id}, message)"
                  - generic [ref=f23e289]: end
                  - generic [ref=f23e291]: defp prepare_payload(messaging) do
                  - generic [ref=f23e292]: "%{"
                  - generic [ref=f23e293]: "\"messaging_type\" => \"RESPONSE\","
                  - generic [ref=f23e294]: "\"recipient\" => %{\"id\" => messaging[\"sender\"][\"id\"]},"
                  - generic [ref=f23e295]: "\"message\" => %{"
                  - generic [ref=f23e296]: "\"text\" => messaging[\"message\"][\"text\"]"
                  - generic [ref=f23e297]: "}"
                  - generic [ref=f23e298]: "}"
                  - generic [ref=f23e299]: end
                  - generic [ref=f23e300]: end
